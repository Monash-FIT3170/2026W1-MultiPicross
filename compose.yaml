  #     DB_HOST: db
  #     DB_USER: ${POSTGRES_USER}
  #     DB_PASSWORD: ${POSTGRES_PASSWORD}
  #     DB_NAME: ${POSTGRES_DB}
  #   depends_on:
  #     - db

volumes:
  pgdata:
